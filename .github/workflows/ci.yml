name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint Python code
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install ruff

      - name: Run ruff (style + basic error checks)
        run: ruff check --exit-zero classify_sessions.py dashboard.py

      - name: Check Python syntax is valid
        run: |
          python -m py_compile classify_sessions.py
          python -m py_compile dashboard.py

  docker-build:
    name: Verify Docker image builds
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build classifier/dashboard image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: cowrie-honeypot:ci-test
